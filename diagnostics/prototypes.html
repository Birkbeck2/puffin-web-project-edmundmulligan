<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototypes - Web Witchcraft and Wizardry</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <link rel="stylesheet" href="../styles/diagnostics/prototypes.css">
        <script src="../scripts/diagnostics/prototypes.js" defer></script>
</head>
<body>
    <header>
        <h1><i class="fas fa-images"></i> Prototypes</h1>
        <nav aria-label="breadcrumb">
            <a href="../index.html">Home</a> &gt;
            <a href="index.html">Diagnostics</a> &gt;
            <a href="prototypes.html" aria-current="page">Prototypes</a>
        </nav>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-button active" data-tab="landing">Landing Page</button>
            <button class="tab-button" data-tab="students">Student Dashboard</button>
            <button class="tab-button" data-tab="lesson">Sample Lesson</button>
        </div>

        <div id="landing-tab" class="tab-content active">
        <div class="controls">
            <div class="control-group">
                <label>Theme:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="landing-theme-light" name="landing-theme" value="light" checked>
                        <label for="landing-theme-light">Light</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="landing-theme-dark" name="landing-theme" value="dark">
                        <label for="landing-theme-dark">Dark</label>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Style:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="landing-style-normal" name="landing-style" value="normal" checked>
                        <label for="landing-style-normal">Normal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="landing-style-subdued" name="landing-style" value="subdued">
                        <label for="landing-style-subdued">Subdued</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="landing-style-vibrant" name="landing-style" value="vibrant">
                        <label for="landing-style-vibrant">Vibrant</label>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Header/Footer:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="landing-expand-minimal" name="landing-expand" value="minimal" checked>
                        <label for="landing-expand-minimal">Minimal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="landing-expand-expanded" name="landing-expand" value="expanded">
                        <label for="landing-expand-expanded">Expanded</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="screenshots" id="landing-screenshots"></div>
    </div>

    <div id="students-tab" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>Theme:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="students-theme-light" name="students-theme" value="light" checked>

                    </div>
                    <div class="radio-option">
                        <input type="radio" id="students-theme-dark" name="students-theme" value="dark">
                        <label for="students-theme-dark">Dark</label>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Style:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="students-style-normal" name="students-style" value="normal" checked>
                        <label for="students-style-normal">Normal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="students-style-subdued" name="students-style" value="subdued">
                        <label for="students-style-subdued">Subdued</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="students-style-vibrant" name="students-style" value="vibrant">
                        <label for="students-style-vibrant">Vibrant</label>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Header/Footer:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="students-expand-minimal" name="students-expand" value="minimal" checked>
                        <label for="students-expand-minimal">Minimal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="students-expand-expanded" name="students-expand" value="expanded">

                    </div>
                </div>
            </div>
        </div>

        <div class="screenshots" id="students-screenshots"></div>
    </div>

    <div id="lesson-tab" class="tab-content">
        <div class="controls">
            <div class="control-group">
                <label>Theme:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="lesson-theme-light" name="lesson-theme" value="light" checked>
                        <label for="lesson-theme-light">Light</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-theme-dark" name="lesson-theme" value="dark">

                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Style:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="lesson-style-normal" name="lesson-style" value="normal" checked>

                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-style-subdued" name="lesson-style" value="subdued">

                    <div class="radio-option">
                        <input type="radio" id="lesson-style-vibrant" name="lesson-style" value="vibrant">

                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Header/Footer:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="lesson-expand-minimal" name="lesson-expand" value="minimal" checked>
                        <label for="lesson-expand-minimal">Minimal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-expand-expanded" name="lesson-expand" value="expanded">
                        <label for="lesson-expand-expanded">Expanded</label>
                    </div>
                </div>
            </div>to select viewport size,

            <div class="control-group section-control">
                <label>Section:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-0" name="lesson-section" value="0" checked>
                        <label for="lesson-section-0">0</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-1" name="lesson-section" value="1">
                        <label for="lesson-section-1">1</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-2" name="lesson-section" value="2">
                        <label for="lesson-section-2">2</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-3" name="lesson-section" value="3">
                        <label for="lesson-section-3">3</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-4" name="lesson-section" value="4">
                        <label for="lesson-section-4">4</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="lesson-section-5" name="lesson-section" value="5">
                        <label for="lesson-section-5">5</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="screenshots" id="lesson-screenshots"></div>
    </div>

    </main>
