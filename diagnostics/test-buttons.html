<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Start of meta tags -->
    <meta charset="UTF-8">
    <meta name="description" content="Button Test Page">
    <meta name="author" content="Edmund Mulligan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- End of meta tags -->

    <!-- Set the document title-->
    <title>Button Test - Web Witchcraft and Wizardry</title>

    <!-- Link to Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/icons/favicon.svg">

    <!--Links for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- End Google Fonts links -->

    <!-- Link to Font Awesome Icons (using CSS rather than JS)-->
    <link rel="stylesheet" href="https://kit.fontawesome.com/3895b3f1a4.css" crossorigin="anonymous">
    <!-- End Font Awesome Icons -->

    <!-- Start of CSS stylesheets section -->

    <!-- globals.css and main.css must be the first stylesheets loaded -->
    <link rel="stylesheet" href="../styles/globals.css">
    <link rel="stylesheet" href="../styles/main.css">

    <!-- These stylesheets are common to all pages -->
    <link rel="stylesheet" href="../styles/components/buttons.css">
    <link rel="stylesheet" href="../styles/components/code.css">
    <link rel="stylesheet" href="../styles/components/header-and-footer.css">
    <link rel="stylesheet" href="../styles/components/lesson-navigation.css">
    <link rel="stylesheet" href="../styles/components/navigation.css">
    <link rel="stylesheet" href="../styles/components/popover.css">
    <link rel="stylesheet" href="../styles/components/titles.css">
    <link rel="stylesheet" href="../styles/pages.css">

</head>

<body>
    <main class="main">
        <nav class="lesson-navigation-panel" aria-label="Lesson navigation">
            <div class="navigation-controls">
                <!-- Fast Rewind -->
                <button type="button" id="fastBackwardBtn" class="nav-button section-nav" title="Go to previous lesson" aria-label="Previous lesson">
                    <i class="fa-duotone fa-regular fa-backward-fast" aria-hidden="true"></i>
                </button>

                <!-- Rewind -->
                <button type="button" id="backwardBtn" class="nav-button section-nav" title="Go to previous section" aria-label="Previous section" disabled>
                    <i class="fa-duotone fa-regular fa-backward-step" aria-hidden="true"></i>
                </button>

                <!-- Forward -->
                <button type="button" id="forwardBtn" class="nav-button section-nav" title="Go to next section" aria-label="Next section">
                    <i class="fa-duotone fa-regular fa-forward-step" aria-hidden="true"></i>
                </button>

                <!-- Fast Forward -->
                <button type="button" id="fastForwardBtn" class="nav-button section-nav"  title="Go to next lesson" aria-label="Next lesson">
                    <i class="fa-duotone fa-regular fa-forward-fast" aria-hidden="true"></i>
                </button>
            </div>
        </nav>
    </main>
</body>
</html>
