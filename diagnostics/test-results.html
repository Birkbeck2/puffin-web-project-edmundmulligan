<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Test Results Dashboard - Web Witchcraft and Wizardry">
    <meta name="keywords" content="testing, accessibility, validation, dashboard">
    <meta name="author" content="Edmund Mulligan">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test Results Dashboard - Web Witchcraft and Wizardry</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/icons/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto+Slab:wght@400;700&family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../styles/globals.css">
    <link rel="stylesheet" href="../styles/pages.css">

    <style>
        body {
            background: var(--colour-page-background);
            color: var(--colour-page-text);
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--colour-headings-background);
            color: var(--colour-headings-text);
            padding: 2rem;
            box-shadow: 0 2px 8px rgb(0 0 0 / 10%);
        }

        header h1 {
            margin: 0 0 1rem 0;
            font-family: 'Roboto Slab', serif;
        }

        nav {
            font-size: 0.9rem;
        }

        nav a {
            color: var(--colour-headings-text);
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dashboard-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .refresh-btn {
            padding: 0.5rem 1rem;
            background: var(--colour-headings-background);
            color: var(--colour-headings-text);
            border: 2px solid var(--colour-headings-text);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .summary-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .summary-card {
            flex: 1;
            min-width: 200px;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgb(0 0 0 / 10%);
            text-align: center;
        }

        .summary-card.success {
            background: hsl(120deg 100% 90%);
            border: 2px solid hsl(120deg 100% 30%);
            color: hsl(120deg 100% 20%);
        }

        .summary-card.warning {
            background: hsl(45deg 100% 90%);
            border: 2px solid hsl(45deg 100% 40%);
            color: hsl(45deg 100% 20%);
        }

        .summary-card.error {
            background: hsl(0deg 100% 90%);
            border: 2px solid hsl(0deg 100% 40%);
            color: hsl(0deg 100% 20%);
        }

        .summary-card.info {
            background: hsl(210deg 100% 90%);
            border: 2px solid hsl(210deg 100% 40%);
            color: hsl(210deg 100% 20%);
        }

        .summary-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0;
        }

        .summary-label {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .test-card {
            background: var(--colour-headings-background);
            color: var(--colour-headings-text);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgb(0 0 0 / 10%);
            transition: transform 0.3s ease;
        }

        .test-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgb(0 0 0 / 15%);
        }

        .test-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--colour-page-background);
        }

        .test-card-title {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.pass {
            background: hsl(120deg 100% 30%);
            color: white;
        }

        .status-badge.fail {
            background: hsl(0deg 100% 40%);
            color: white;
        }

        .status-badge.warning {
            background: hsl(45deg 100% 50%);
            color: hsl(0deg 0% 10%);
        }

        .status-badge.info {
            background: hsl(210deg 100% 50%);
            color: white;
        }

        .test-card-body {
            font-size: 0.95rem;
        }

        .test-metric {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--colour-page-background);
        }

        .test-metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 600;
        }

        .metric-value {
            font-weight: normal;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }

        .error-message {
            background: hsl(0deg 100% 90%);
            border: 2px solid hsl(0deg 100% 40%);
            color: hsl(0deg 100% 20%);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .details-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 3px solid var(--colour-headings-background);
        }

        .details-section h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .details-content {
            background: var(--colour-code-background);
            color: var(--colour-code-text);
            padding: 1.5rem;
            border-radius: 0.5rem;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .timestamp {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--colour-page-text);
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .test-grid {
                grid-template-columns: 1fr;
            }

            .summary-bar {
                flex-direction: column;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-chart-line"></i> Test Results Dashboard</h1>
        <nav aria-label="breadcrumb">
            <a href="../index.html">Home</a> &gt;
            <a href="test-results.html" aria-current="page">Test Results</a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <div class="dashboard-title">Automated Test Suite Results</div>
            <button class="refresh-btn" onclick="loadAllResults()">
                <i class="fas fa-sync-alt"></i> Refresh Results
            </button>
        </div>

        <div id="summary-bar" class="summary-bar">
            <div class="summary-card info">
                <div class="summary-value" id="total-tests">-</div>
                <div class="summary-label">Total Tests</div>
            </div>
            <div class="summary-card success">
                <div class="summary-value" id="passed-tests">-</div>
                <div class="summary-label">Passed</div>
            </div>
            <div class="summary-card error">
                <div class="summary-value" id="failed-tests">-</div>
                <div class="summary-label">Failed</div>
            </div>
            <div class="summary-card warning">
                <div class="summary-value" id="warnings">-</div>
                <div class="summary-label">Warnings</div>
            </div>
        </div>

        <div id="test-results" class="test-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading test results...</div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </main>

    <script>
        async function loadJSON(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Error loading ${path}:`, error);
                return null;
            }
        }

        async function loadText(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.text();
            } catch (error) {
                console.error(`Error loading ${path}:`, error);
                return null;
            }
        }

        function createTestCard(title, icon, status, metrics) {
            const statusClass = status.toLowerCase();
            const statusBadge = `<span class="status-badge ${statusClass}">${status}</span>`;
            
            let metricsHTML = '';
            metrics.forEach(metric => {
                metricsHTML += `
                    <div class="test-metric">
                        <span class="metric-label">${metric.label}:</span>
                        <span class="metric-value">${metric.value}</span>
                    </div>
                `;
            });

            return `
                <div class="test-card">
                    <div class="test-card-header">
                        <div class="test-card-title">
                            <i class="${icon}"></i> ${title}
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="test-card-body">
                        ${metricsHTML}
                    </div>
                </div>
            `;
        }

        async function loadAllResults() {
            const resultsContainer = document.getElementById('test-results');
            resultsContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading test results...</div>';

            let totalTests = 0;
            let passedTests = 0;
            let failedTests = 0;
            let totalWarnings = 0;

            const cards = [];

            // Load Validation Results
            const validation = await loadJSON('../test-results/validation-results.json');
            if (validation) {
                const hasErrors = validation.summary.htmlErrors > 0 || 
                                validation.summary.cssErrors > 0 || 
                                validation.summary.jsErrors > 0;
                const status = hasErrors ? 'fail' : 'pass';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;
                totalWarnings += validation.summary.htmlWarnings + 
                               validation.summary.cssWarnings + 
                               validation.summary.jsWarnings;

                cards.push(createTestCard(
                    'Code Validation',
                    'fas fa-check-circle',
                    status,
                    [
                        { label: 'HTML Errors', value: validation.summary.htmlErrors },
                        { label: 'CSS Errors', value: validation.summary.cssErrors },
                        { label: 'JS Errors', value: validation.summary.jsErrors },
                        { label: 'Total Warnings', value: totalWarnings }
                    ]
                ));
            }

            // Load Broken Links Results
            const links = await loadJSON('../test-results/broken-links-results.json');
            if (links) {
                const totalBroken = links.pages.reduce((sum, page) => sum + page.brokenCount, 0);
                const totalLinks = links.pages.reduce((sum, page) => sum + page.totalCount, 0);
                const status = totalBroken === 0 ? 'pass' : 'fail';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;

                cards.push(createTestCard(
                    'Broken Links Check',
                    'fas fa-link',
                    status,
                    [
                        { label: 'Pages Checked', value: links.pages.length },
                        { label: 'Total Links', value: totalLinks },
                        { label: 'Broken Links', value: totalBroken }
                    ]
                ));
            }

            // Load Axe Results
            const axe = await loadJSON('../test-results/axe-results.json');
            if (axe) {
                const totalViolations = axe.violations ? axe.violations.length : 0;
                const status = totalViolations === 0 ? 'pass' : 'fail';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;

                cards.push(createTestCard(
                    'Axe Accessibility',
                    'fas fa-universal-access',
                    status,
                    [
                        { label: 'Total Violations', value: totalViolations },
                        { label: 'Passes', value: axe.passes ? axe.passes.length : 0 },
                        { label: 'Incomplete', value: axe.incomplete ? axe.incomplete.length : 0 }
                    ]
                ));
            }

            // Load Pa11y Results
            const pa11y = await loadJSON('../test-results/pa11y-results.json');
            if (pa11y) {
                const totalErrors = pa11y.pages.reduce((sum, page) => 
                    sum + page.issues.filter(i => i.type === 'error').length, 0);
                const totalWarningsP = pa11y.pages.reduce((sum, page) => 
                    sum + page.issues.filter(i => i.type === 'warning').length, 0);
                const status = totalErrors === 0 ? 'pass' : 'fail';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;
                totalWarnings += totalWarningsP;

                cards.push(createTestCard(
                    'Pa11y Accessibility',
                    'fas fa-wheelchair',
                    status,
                    [
                        { label: 'Pages Tested', value: pa11y.pages.length },
                        { label: 'Errors', value: totalErrors },
                        { label: 'Warnings', value: totalWarningsP }
                    ]
                ));
            }

            // Load Lighthouse Results
            const lighthouse = await loadJSON('../test-results/lighthouse-results.json');
            if (lighthouse) {
                const avgScore = lighthouse.pages.length > 0
                    ? Math.round((lighthouse.pages.reduce((sum, page) => sum + page.score, 0) / lighthouse.pages.length) * 100)
                    : 0;
                const pagesWithIssues = lighthouse.pages.filter(p => p.failedAudits && p.failedAudits.length > 0).length;
                const status = pagesWithIssues === 0 ? 'pass' : 'fail';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;

                cards.push(createTestCard(
                    'Lighthouse',
                    'fas fa-lightbulb',
                    status,
                    [
                        { label: 'Pages Tested', value: lighthouse.pages.length },
                        { label: 'Average Score', value: `${avgScore}%` },
                        { label: 'Pages with Issues', value: pagesWithIssues }
                    ]
                ));
            }

            // Load Browser Results
            const browser = await loadJSON('../test-results/browser-results.json');
            if (browser) {
                const failed = browser.results ? browser.results.filter(r => !r.passed).length : 0;
                const status = failed === 0 ? 'pass' : 'fail';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else failedTests++;

                cards.push(createTestCard(
                    'Browser Compatibility',
                    'fas fa-browser',
                    status,
                    [
                        { label: 'Browsers Tested', value: browser.results ? browser.results.length : 0 },
                        { label: 'Passed', value: browser.results ? browser.results.filter(r => r.passed).length : 0 },
                        { label: 'Failed', value: failed }
                    ]
                ));
            }

            // Load Readability Results
            const readability = await loadJSON('../test-results/readability-results.json');
            if (readability) {
                const avgGrade = readability.pages && readability.pages.length > 0
                    ? (readability.pages.reduce((sum, page) => sum + page.gradeLevel, 0) / readability.pages.length).toFixed(1)
                    : 0;
                const status = avgGrade <= 12 ? 'pass' : 'warning';
                
                totalTests++;
                if (status === 'pass') passedTests++;
                else if (status === 'warning') totalWarnings++;

                cards.push(createTestCard(
                    'Reading Age',
                    'fas fa-book-reader',
                    status,
                    [
                        { label: 'Pages Analyzed', value: readability.pages ? readability.pages.length : 0 },
                        { label: 'Average Grade Level', value: avgGrade },
                        { label: 'Total Words', value: readability.totalWords || 0 }
                    ]
                ));
            }

            // Update summary
            document.getElementById('total-tests').textContent = totalTests;
            document.getElementById('passed-tests').textContent = passedTests;
            document.getElementById('failed-tests').textContent = failedTests;
            document.getElementById('warnings').textContent = totalWarnings;

            // Display cards
            if (cards.length > 0) {
                resultsContainer.innerHTML = cards.join('');
            } else {
                resultsContainer.innerHTML = '<div class="error-message">No test results found. Please run tests first.</div>';
            }

            // Update timestamp
            const now = new Date();
            document.getElementById('timestamp').textContent = `Last updated: ${now.toLocaleString()}`;
        }

        // Load results on page load
        window.addEventListener('DOMContentLoaded', loadAllResults);
    </script>
</body>
</html>
