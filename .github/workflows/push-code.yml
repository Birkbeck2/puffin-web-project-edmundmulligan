name: Push Code to Prod Server

on:
    push:
      branches: [ main]
    pull_request:
      branches: [ main ]

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Determine version bump type
      id: bump_type
      run: |
        if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
          echo "value=patch" >> "$GITHUB_OUTPUT"
        else
          echo "Unsupported branch '${GITHUB_REF_NAME}' for automatic version bump." >&2
          exit 1
        fi

    - name: Bump semantic version
      id: version
      run: |
        new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" VERSION)"
        echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
        echo "New version: ${new_version}"

    - name: Create release tarball
      run: bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" releases

    - name: Commit generated release files to development branch
      env:
        RELEASE_VERSION: ${{ steps.version.outputs.new_version }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Switch to development branch
        git fetch origin development
        git checkout development
        git pull origin development

        # Add release files
        git add VERSION releases

        if git diff --cached --quiet; then
          echo "No generated files changed."
        else
          git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
          git push origin development
        fi
        
        # Switch back to main for deployment
        git checkout main

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: prod.edmundmulligan.name
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "index.html,bin/,data/,diagnostics/,images/,mentors/,output/,pages/,scripts/,students/,styles/,test-results/"
        target: /var/www/web.witchcraft-and-wizardry.school
        rm: false
