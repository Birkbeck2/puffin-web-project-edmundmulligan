name: Push Code to Prod Server

on:
  push:
    branches: [ main ]

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: Determine version bump type
      id: bump_type
      run: |
        echo "Event: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "value=patch" >> "$GITHUB_OUTPUT"

    - name: Bump semantic version
      id: version
      run: |
        new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" VERSION)"
        echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
        echo "New version: ${new_version}"

    - name: Create release tarball
      run: bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" releases

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: prod.edmundmulligan.name
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "index.html,bin/,data/,diagnostics/,images/,mentors/,pages/,scripts/,students/,styles/"
        target: /var/www/web.witchcraft-and-wizardry.school
        rm: false
