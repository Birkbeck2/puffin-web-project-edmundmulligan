name: Deploy to GitHub Pages

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Select automatic version bump type
        id: bump_type
        run: |
          if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "value=patch" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "value=minor" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch '${GITHUB_REF_NAME}' for automatic version bump." >&2
            exit 1
          fi

      - name: Bump semantic version
        id: version
        run: |
          new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" VERSION)"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "New version: ${new_version}"

      - name: Create release tarball
        run: bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" releases

      - name: Commit generated release files (excluding test results)
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add VERSION releases

          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
            git push
          fi

      - name: Prepare Pages artifact directory
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a index.html bin data diagnostics images mentors pages scripts students styles _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-and-release
    if: needs.build-and-release.result == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
