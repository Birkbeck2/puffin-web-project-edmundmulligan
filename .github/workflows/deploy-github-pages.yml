name: Deploy to GitHub Pages

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clear previous accessibility results
        run: bin/clear-tests.sh .

      - name: Validate HTML, CSS and JavaScript
        continue-on-error: true
        run: bin/validate-code.sh .

      - name: Audit colour usage
        continue-on-error: true
        run: node bin/audit-colour-usage.js

      - name: Check for file comments
        continue-on-error: true
        run: bin/check-file-comments.sh .

      - name: Check for broken links
        continue-on-error: true
        run: bin/check-links.sh .

      - name: Install Chrome for browser-based tests
        run: npx puppeteer browsers install chrome

      - name: Run axe accessibility tests
        continue-on-error: true
        run: bin/run-axe-tests.sh . -q -x manipulated-images

      - name: Run Lighthouse accessibility tests
        continue-on-error: true
        run: bin/run-lighthouse-tests.sh . -q -x manipulated-images

      - name: Run Pa11y accessibility tests
        continue-on-error: true
        run: bin/run-pa11y-tests.sh . -q -x manipulated-images

      - name: Run WAVE accessibility tests
        continue-on-error: true
        run: bin/run-wave-tests.sh . -q -x manipulated-images
        env:
          WAVE_API_KEY: ${{ secrets.WAVE_API_KEY }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Check reading levels
        continue-on-error: true
        run: bin/check-reading-age.sh . -x manipulated-images

      - name: Check site works in different browsers
        continue-on-error: true
        run: bin/run-browser-tests.sh .

      - name: Summarise test results
        continue-on-error: true
        run: bin/summarise-tests.sh .

      - name: Select automatic version bump type
        id: bump_type
        run: |
          if [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            echo "value=patch" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "value=minor" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch '${GITHUB_REF_NAME}' for automatic version bump." >&2
            exit 1
          fi

      - name: Bump semantic version
        id: version
        run: |
          new_version="$(bin/bump-version.sh "${{ steps.bump_type.outputs.value }}" VERSION)"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "New version: ${new_version}"

      - name: Create release tarball
        run: bin/create-release-tar.sh "${{ steps.version.outputs.new_version }}" releases

      - name: Commit generated release files (excluding test results)
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add VERSION releases

          if git diff --cached --quiet; then
            echo "No generated files changed."
          else
            git commit -m "chore(release): v${RELEASE_VERSION} [skip ci]"
            git push
          fi

      - name: Prepare Pages artifact directory
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a index.html bin data diagnostics images mentors output pages scripts students styles test-results _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-test-version
    if: needs.build-test-version.result == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
