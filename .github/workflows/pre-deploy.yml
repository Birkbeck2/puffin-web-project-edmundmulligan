name: Accessibility Testing and Deployment

on:
    pull_request:
        branches: [ staging, main ]
        paths:
        - '**'
        - '!.github/**'
        - '.github/workflows/pre-deploy.yml'

env:
  testurl: 'http://localhost:8080'
  testport: '8080'

jobs:
  run-pre-deployment-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci

    - name: Clear previous accessibility results
      run: |
        bin/clear-tests.sh .

    - name: Validate HTML, CSS and JavaScript
      continue-on-error: true
      run: |
        bin/validate-code.sh .

    - name: Audit colour usage
      continue-on-error: true
      run: |
        node bin/audit-colour-usage.js

    - name: Check for file comments
      continue-on-error: true
      run: |
        bin/check-file-comments.sh .

    - name: Check for broken links
      continue-on-error: true
      run: |
        bin/check-links.sh .

    - name: Install Chrome for browser-based tests
      run: |
        npx puppeteer browsers install chrome

    - name: Run axe accessibility tests
      continue-on-error: true
      run: |
        bin/run-axe-tests.sh -q .

    - name: Run Lighthouse accessibility tests
      continue-on-error: true
      run: |
        bin/run-lighthouse-tests.sh -q .

    - name: Run Pa11y accessibility tests
      continue-on-error: true
      run: |
        bin/run-pa11y-tests.sh -q .

    - name: Run WAVE accessibility tests
      continue-on-error: true
      run: |
        bin/run-wave-tests.sh -q .
      env:
        WAVE_API_KEY: ${{ secrets.WAVE_API_KEY }}
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}

    - name: Check reading levels
      continue-on-error: true
      run: |
        bin/check-reading-age.sh .

    - name: Check site works in different browsers
      continue-on-error: true
      run: |
        bin/run-browser-tests.sh .

    - name: Summarise test results
      continue-on-error: false
      run: |
        bin/summarise-tests.sh .

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          diagnostics/test-results/axe-results.json
          diagnostics/test-results/broken-links-results.json
          diagnostics/test-results/browser-results.json
          diagnostics/test-results/colour-audit-report.json
          diagnostics/test-results/file-comments-check-results.json
          diagnostics/test-results/lighthouse-results.json
          diagnostics/test-results/pa11y-results.json
          diagnostics/test-results/readability-results.json
          diagnostics/test-results/validation-results.json
          diagnostics/test-results/wave-results.json

  deploy:
    needs: run-pre-deployment-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Read version number
      id: version
      run: echo "number=$(cat VERSION)" >> $GITHUB_OUTPUT

    - name: Create release tarball
      run: |
        bin/create-release-tar.sh ${{ steps.version.outputs.number }}

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: prod.edmundmulligan.name
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "releases/puffin-web-project-edmundmulligan-v${{ steps.version.outputs.number }}.tar.gz"
        target: /var/www/puffin.edmundmulligan.name
        rm: false

    - name: Extract files on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: prod.edmundmulligan.name
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/puffin.edmundmulligan.name
          tar -xzf releases/puffin-web-project-edmundmulligan-v${{ steps.version.outputs.number }}.tar.gz
          rm releases/puffin-web-project-edmundmulligan-v${{ steps.version.outputs.number }}.tar.gz
